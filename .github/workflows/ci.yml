# CI — PR gate.
# spec-lint job: real PHASE-1 invocations (CHG-0013).
# trace-gates, unit-integration, phase-exit: still PHASE-0 placeholders;
#   become real in PHASE-2 / PHASE-3+.
# See: openspec/architecture/decisions/ADR-0008-ci-gates-and-phase-exits.md

name: ci

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  spec-lint:
    name: spec-lint (PHASE-1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required by history-based rules (req-id-immutable,
          # req-append-only) and by git log probes in test_phase0.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: openspec-validate (every spec_lint markdown + code rule)
        run: python -m tools.spec_lint validate openspec

      - name: top-level-allowlist (REQ-ARCH-0001)
        run: python -m tools.spec_lint check-layout

      - name: pytest (unit + property + mutation + architecture invariants + annotation discipline)
        run: pytest tools/ -v

  trace-gates:
    name: trace-gates (PHASE-2)
    runs-on: ubuntu-latest
    needs: spec-lint
    steps:
      - uses: actions/checkout@v4
      - run: 'echo "TODO PHASE-2: run tools/trace; gates: matrix-drift, commit-trailers-valid, red-before-green, req-coverage-100, tier-coverage, gate-coverage"; exit 0'

  unit-integration:
    name: unit + integration tiers
    runs-on: ubuntu-latest
    needs: trace-gates
    steps:
      - uses: actions/checkout@v4
      - run: 'echo "TODO PHASE-3+: per-package unit + integration tiers via matrix"; exit 0'

  phase-exit:
    name: phase-exit (on merge to main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [spec-lint, trace-gates, unit-integration]
    steps:
      - uses: actions/checkout@v4
      - run: 'echo "TODO PHASE-2: tools/trace/phase_exit.py — verify active phase exit REQs tests-green"; exit 0'
