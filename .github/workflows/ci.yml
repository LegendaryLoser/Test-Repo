# CI — PR gate.
# Job declarations only in PHASE-0; steps are TODO placeholders. Real steps
# land in PHASE-1 (spec-lint) and PHASE-2 (trace gates).
# See: openspec/architecture/decisions/ADR-0008-ci-gates-and-phase-exits.md

name: ci

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  spec-lint:
    name: spec-lint (PHASE-1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: 'echo "TODO PHASE-1: install + run tools/spec_lint; gates: openspec-validate, top-level-allowlist, bmad-direct-reference, gas-global-outside-adapter, req-id-format, req-id-immutable, prose-xref-banned, xref-resolves, compound-requirement-detector, anti-aliasing, spec-frontmatter-valid, index-up-to-date, req-append-only, mock-in-repo-banned, direct-anthropic-import-banned, stochastic-tier-bans"; exit 0'

  trace-gates:
    name: trace-gates (PHASE-2)
    runs-on: ubuntu-latest
    needs: spec-lint
    steps:
      - uses: actions/checkout@v4
      - run: 'echo "TODO PHASE-2: run tools/trace; gates: matrix-drift, commit-trailers-valid, red-before-green, req-coverage-100, tier-coverage, gate-coverage"; exit 0'

  unit-integration:
    name: unit + integration tiers
    runs-on: ubuntu-latest
    needs: trace-gates
    steps:
      - uses: actions/checkout@v4
      - run: 'echo "TODO PHASE-3+: per-package unit + integration tiers via matrix"; exit 0'

  phase-exit:
    name: phase-exit (on merge to main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [spec-lint, trace-gates, unit-integration]
    steps:
      - uses: actions/checkout@v4
      - run: 'echo "TODO PHASE-2: tools/trace/phase_exit.py — verify active phase exit REQs tests-green"; exit 0'
